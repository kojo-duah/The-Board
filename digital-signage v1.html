<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
<title>DigiSign — Denver, CO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --glass-bg: rgba(255,255,255,0.12);
    --glass-bg-strong: rgba(255,255,255,0.15);
    --glass-border: rgba(255,255,255,0.2);
    --text-primary: #fff;
    --text-secondary: rgba(255,255,255,0.78);
    --text-muted: rgba(255,255,255,0.5);
    --accent: #64d2ff;
    --blur: 40px;
    --radius: 24px;
    --radius-sm: 16px;
    --font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: var(--font);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  /* ══════════════════════════════════
     FULL-SCREEN WEATHER PHOTO BG
     Like iPhone Weather app
     ══════════════════════════════════ */
  #weather-bg {
    position: fixed; inset: -20px; z-index: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    animation: ken-burns 25s ease-in-out infinite alternate;
  }
  @keyframes ken-burns {
    0%   { transform: scale(1)    translate(0, 0); }
    100% { transform: scale(1.08) translate(-1%, -1.5%); }
  }

  /* Pre-blurred background — sits just below #app so glass
     cards see a BLURRED photo in ALL browsers (Safari, Chrome, Edge).
     This is what makes the frosted-glass effect universal. */
  #weather-bg-blur {
    position: fixed; inset: -40px; z-index: 5;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: blur(28px) saturate(120%) brightness(1.02);
    animation: ken-burns 25s ease-in-out infinite alternate;
  }

  /* Static readability gradient (on top of blur) */
  #weather-bg-blur::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.10) 0%,
      rgba(0,0,0,0.03) 30%,
      rgba(0,0,0,0.03) 60%,
      rgba(0,0,0,0.20) 100%
    );
  }

  /* ── Animated weather colour overlay (via JS scene class) ── */
  #weather-anim-overlay {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
  }

  /* Rainy: blue-grey pulse */
  #weather-anim-overlay.scene-rainy {
    background: linear-gradient(180deg, rgba(20,45,80,0.45) 0%, rgba(15,35,65,0.25) 100%);
    animation: rain-pulse 4s ease-in-out infinite;
  }
  @keyframes rain-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

  /* Thunderstorm: flash */
  #weather-anim-overlay.scene-thunderstorm {
    background: rgba(20,30,60,0.4);
    animation: lightning 7s ease-in-out infinite;
  }
  @keyframes lightning {
    0%,79%,82%,84%,100% { opacity: 1; }
    80%,83% { opacity: 0; background: rgba(255,255,255,0.35); }
  }

  /* Sunny: warm golden glow */
  #weather-anim-overlay.scene-sunny {
    background: radial-gradient(ellipse at 65% 10%, rgba(255,190,40,0.35) 0%, transparent 65%);
    animation: sun-glow 5s ease-in-out infinite;
  }
  @keyframes sun-glow {
    0%,100% { opacity: 0.5; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.08); }
  }

  /* Partly cloudy */
  #weather-anim-overlay.scene-partly-cloudy {
    background: radial-gradient(ellipse at 60% 8%, rgba(255,200,80,0.22) 0%, transparent 55%);
    animation: sun-glow 7s ease-in-out infinite;
  }

  /* Night: moonlight */
  #weather-anim-overlay.scene-night {
    background: radial-gradient(ellipse at 25% 15%, rgba(80,110,210,0.25) 0%, transparent 55%);
    animation: night-shimmer 8s ease-in-out infinite;
  }
  @keyframes night-shimmer { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* Fog: drifting haze */
  #weather-anim-overlay.scene-fog {
    background: linear-gradient(180deg, rgba(220,225,235,0.25) 0%, rgba(220,225,235,0.35) 50%, rgba(220,225,235,0.1) 100%);
    animation: fog-drift 10s ease-in-out infinite;
  }
  @keyframes fog-drift {
    0%,100% { opacity: 0.4; transform: translateX(-8px); }
    50%      { opacity: 1;   transform: translateX(8px); }
  }

  /* Snowy */
  #weather-anim-overlay.scene-snowy {
    background: radial-gradient(ellipse at 50% 0%, rgba(200,225,255,0.28) 0%, transparent 65%);
    animation: snow-glow 6s ease-in-out infinite;
  }
  @keyframes snow-glow { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* Cloudy */
  #weather-anim-overlay.scene-cloudy {
    background: linear-gradient(180deg, rgba(60,80,110,0.22) 0%, transparent 55%);
    animation: cloud-dim 9s ease-in-out infinite;
  }
  @keyframes cloud-dim { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  /* Animated weather particles */
  .weather-layer { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .cloud {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    filter: blur(80px);
    animation: drift linear infinite;
  }
  @keyframes drift { from { transform: translateX(-30%); } to { transform: translateX(120vw); } }
  .raindrop {
    position: absolute; width: 1.5px;
    background: linear-gradient(to bottom, transparent, rgba(200,220,255,0.4));
    animation: fall linear infinite; border-radius: 0 0 2px 2px;
  }
  @keyframes fall { from { transform: translateY(-10vh); } to { transform: translateY(110vh); } }
  .snowflake {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.7);
    animation: snowfall linear infinite; filter: blur(0.5px);
  }
  @keyframes snowfall { from { transform: translateY(-5vh) translateX(0); } to { transform: translateY(110vh) translateX(30px); } }

  /* ══════════════════════════════════
     LAYOUT
     ══════════════════════════════════ */
  #app {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 28px 20px;
    gap: 16px;
  }

  .glass {
    /* Frosted tint — the blur comes from #weather-bg-blur behind */
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.28);
    border-radius: var(--radius-sm);
    box-shadow: 0 4px 24px rgba(0,0,0,0.12),
                inset 0 1px 0 rgba(255,255,255,0.18),
                inset 0 -1px 0 rgba(255,255,255,0.05);
    animation: fadeUp 0.6s ease both;
    overflow: hidden;
    /* Safari bonus: extra real-time blur on top of the pre-blurred bg */
    -webkit-backdrop-filter: blur(12px) saturate(140%);
    backdrop-filter: blur(12px) saturate(140%);
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  /* ─── Top Widget Row ─── */
  .widget-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    flex-shrink: 0;
  }

  .widget-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.8px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 6px;
  }

  /* Clock */
  .widget-clock {
    padding: 18px 12px;
    text-align: center;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    animation-delay: 0.05s;
  }
  #clock-time {
    font-size: 40px;
    font-weight: 200;
    letter-spacing: -2px;
    line-height: 1;
  }
  #clock-ampm {
    font-size: 14px; font-weight: 400;
    color: var(--text-secondary);
    margin-left: 2px;
    vertical-align: super;
  }
  #clock-date {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 5px;
    font-weight: 400;
  }

  /* Weather */
  .widget-weather {
    padding: 18px 12px;
    text-align: center;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    animation-delay: 0.1s;
  }
  .w-icon { font-size: 32px; line-height: 1; margin-bottom: 2px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
  .w-temp { font-size: 34px; font-weight: 200; letter-spacing: -1px; line-height: 1; }
  .w-temp-unit { font-size: 16px; font-weight: 300; color: var(--text-secondary); }
  .w-cond { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
  .w-hilo { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* Calendar */
  .widget-calendar {
    padding: 18px 12px;
    text-align: center;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    animation-delay: 0.15s;
  }
  .cal-month {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.5px; color: #ff453a;
    font-weight: 700; margin-bottom: 1px;
  }
  .cal-day {
    font-size: 44px; font-weight: 200;
    line-height: 1; letter-spacing: -2px;
  }
  .cal-weekday {
    font-size: 11px; color: var(--text-secondary);
    margin-top: 3px; font-weight: 400;
  }

  /* ─── Forecast Strip ─── */
  .forecast-strip {
    display: flex; gap: 5px; flex-shrink: 0;
    animation: fadeUp 0.6s ease 0.22s both;
  }
  .forecast-strip .glass {
    flex: 1; padding: 10px 4px; text-align: center;
    border-radius: 12px; animation: none;
  }
  .fc-day { font-size: 9px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
  .fc-icon { font-size: 20px; margin-bottom: 3px; }
  .fc-temp { font-size: 15px; font-weight: 300; }
  .fc-precip { font-size: 9px; color: var(--accent); font-weight: 600; margin-top: 2px; min-height: 14px; }

  /* ─── News Feed ─── */
  .news-section {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    animation: fadeUp 0.6s ease 0.3s both;
  }
  .news-section .glass {
    flex: 1; display: flex; flex-direction: column;
    padding: 18px 16px;
    border-radius: var(--radius);
    animation: none;
    background: rgba(255,255,255,0.20);
  }
  .news-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; flex-shrink: 0;
  }
  .news-label {
    font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px;
    color: rgba(255,255,255,0.6); font-weight: 700;
    display: flex; align-items: center; gap: 7px;
  }
  .news-label::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: #ff3b30; animation: pulse-dot 2s ease infinite;
  }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .news-source-tag {
    font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif;
    font-size: 11px; background: rgba(255,255,255,0.1);
    padding: 4px 10px; border-radius: 20px;
    color: rgba(255,255,255,0.75); font-weight: 600; letter-spacing: 0.3px;
  }

  .news-items {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
    /* iOS system font for max readability */
    font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', BlinkMacSystemFont, 'Helvetica Neue', 'Inter', sans-serif;
  }
  .news-item {
    padding: 11px 14px; border-radius: 14px;
    transition: background 0.25s; animation: fadeIn 0.4s ease both;
    display: flex; align-items: center; gap: 12px;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .news-item:hover { background: rgba(255,255,255,0.05); }
  .news-item-body { flex: 1; min-width: 0; }
  .news-item-title {
    font-size: 15.5px; font-weight: 600; line-height: 1.35;
    color: rgba(255,255,255,0.95);
    letter-spacing: -0.2px;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px;
  }
  .news-item-meta {
    font-size: 12px; color: rgba(255,255,255,0.55);
    display: flex; align-items: center; gap: 6px;
    font-weight: 400;
  }
  .news-item-source { color: var(--accent); font-weight: 700; font-size: 12px; }
  .news-item-url {
    max-width: 180px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; font-size: 11px;
  }
  .news-qr {
    flex-shrink: 0; width: 48px; height: 48px; border-radius: 8px;
    background: #fff; padding: 3px; opacity: 0.92;
  }
  .news-qr img { width: 100%; height: 100%; display: block; border-radius: 4px; }
  .news-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 0 14px; }

  /* ─── Settings gear button ─── */
  .settings-btn {
    position: fixed; bottom: 14px; right: 14px; z-index: 100;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: rgba(255,255,255,0.5); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.25s;
  }
  .settings-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }

  /* ─── Settings Panel ─── */
  .settings-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    display: none; align-items: center; justify-content: center;
  }
  .settings-overlay.open { display: flex; }
  .settings-panel {
    background: rgba(30,30,40,0.95); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 24px; width: 340px; max-height: 80vh;
    overflow-y: auto; color: #fff;
  }
  .settings-panel h3 {
    font-size: 14px; font-weight: 600; margin-bottom: 16px;
    letter-spacing: 0.5px;
  }
  .feed-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .feed-row {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.06); border-radius: 10px; padding: 8px 10px;
  }
  .feed-row .feed-name {
    font-size: 12px; font-weight: 600; color: var(--accent); min-width: 42px;
  }
  .feed-row .feed-url {
    flex: 1; font-size: 10px; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .feed-row .feed-del {
    background: none; border: none; color: rgba(255,80,80,0.7);
    font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .feed-row .feed-del:hover { color: #ff4040; }
  .feed-add-row { display: flex; gap: 6px; margin-bottom: 16px; }
  .feed-add-row input {
    flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; padding: 7px 10px; color: #fff; font-size: 11px;
    font-family: var(--font); outline: none;
  }
  .feed-add-row input::placeholder { color: rgba(255,255,255,0.3); }
  .feed-add-row input:focus { border-color: var(--accent); }
  .btn-sm {
    background: var(--accent); color: #000; border: none; border-radius: 8px;
    padding: 7px 12px; font-size: 11px; font-weight: 600; cursor: pointer;
    font-family: var(--font);
  }
  .btn-sm:hover { opacity: 0.85; }
  .btn-close-settings {
    width: 100%; background: rgba(255,255,255,0.08); color: var(--text-secondary);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 9px;
    font-size: 12px; cursor: pointer; font-family: var(--font); margin-top: 4px;
  }
  .btn-close-settings:hover { background: rgba(255,255,255,0.12); }

  .carousel-indicator { display: flex; justify-content: center; gap: 4px; margin-top: 12px; flex-shrink: 0; }
  .carousel-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.18); transition: all 0.3s;
    cursor: pointer;
  }
  .carousel-dot:hover { background: rgba(255,255,255,0.45); }
  .carousel-dot.active { background: rgba(255,255,255,0.7); width: 14px; border-radius: 3px; }

  .skeleton {
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s ease infinite; border-radius: 5px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* ─── Location tag (like iPhone "Denver" label) ─── */
  .location-bar {
    text-align: center; flex-shrink: 0;
    animation: fadeUp 0.6s ease 0s both;
  }
  .location-name {
    font-size: 12px; font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 1px;
    display: flex; align-items: center;
    justify-content: center; gap: 5px;
  }
  .location-name .loc-icon { font-size: 10px; }

  @media (max-width: 420px) {
    #app { padding: 20px 12px; gap: 12px; }
    #clock-time { font-size: 32px; }
    .w-temp { font-size: 28px; }
    .cal-day { font-size: 36px; }
    .news-item-title { font-size: 13px; }
  }
  @media (min-width: 500px) {
    #clock-time { font-size: 48px; }
    .w-temp { font-size: 40px; }
    .cal-day { font-size: 52px; }
  }
</style>
</head>
<body>

<!-- Full-screen weather photo background -->
<div id="weather-bg"></div>
<div id="weather-anim-overlay"></div>
<div class="weather-layer" id="weather-effects"></div>
<!-- Pre-blurred bg — sits above effects, below #app — this is what
     makes the frosted glass work identically in Safari, Chrome & Edge -->
<div id="weather-bg-blur"></div>

<!-- Settings gear -->
<button class="settings-btn" onclick="document.getElementById('settings-overlay').classList.add('open')" title="Feed settings">&#9881;</button>

<!-- Settings panel -->
<div class="settings-overlay" id="settings-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="settings-panel">
    <h3>RSS Feed Sources</h3>
    <div class="feed-list" id="feed-list"></div>
    <div class="feed-add-row">
      <input type="text" id="add-feed-name" placeholder="Name (e.g. NPR)" style="max-width:70px">
      <input type="text" id="add-feed-url" placeholder="RSS feed URL…">
      <button class="btn-sm" onclick="addFeed()">Add</button>
    </div>
    <button class="btn-close-settings" onclick="document.getElementById('settings-overlay').classList.remove('open')">Done</button>
  </div>
</div>

<div id="app">

  <!-- Location label like iPhone -->
  <div class="location-bar">
    <div class="location-name">
      <span class="loc-icon">☁️</span>
      <span id="loc-text">Denver, CO</span>
    </div>
  </div>

  <!-- Top Row: Clock | Weather | Calendar -->
  <div class="widget-row">
    <div class="glass widget-clock">
      <div class="widget-label">Clock</div>
      <div id="clock-time">--:--</div>
      <div id="clock-date">Loading…</div>
    </div>
    <div class="glass widget-weather">
      <div class="widget-label">Denver</div>
      <div class="w-icon" id="w-icon">—</div>
      <div class="w-temp" id="w-temp">--<span class="w-temp-unit">°</span></div>
      <div class="w-cond" id="w-cond">…</div>
      <div class="w-hilo" id="w-hilo"></div>
    </div>
    <div class="glass widget-calendar">
      <div class="cal-month" id="cal-month">---</div>
      <div class="cal-day" id="cal-day">--</div>
      <div class="cal-weekday" id="cal-weekday">---</div>
    </div>
  </div>

  <!-- Forecast -->
  <div class="forecast-strip" id="forecast-strip"></div>

  <!-- News -->
  <div class="news-section">
    <div class="glass">
      <div class="news-header">
        <div class="news-label">News Feed</div>
        <div class="news-source-tag" id="news-source-tag">Loading…</div>
      </div>
      <div class="news-items" id="news-items">
        <div class="news-item"><div class="skeleton" style="height:16px;width:80%;margin-bottom:7px"></div><div class="skeleton" style="height:11px;width:45%"></div></div>
        <div class="news-divider"></div>
        <div class="news-item"><div class="skeleton" style="height:16px;width:65%;margin-bottom:7px"></div><div class="skeleton" style="height:11px;width:40%"></div></div>
        <div class="news-divider"></div>
        <div class="news-item"><div class="skeleton" style="height:16px;width:72%;margin-bottom:7px"></div><div class="skeleton" style="height:11px;width:50%"></div></div>
        <div class="news-divider"></div>
        <div class="news-item"><div class="skeleton" style="height:16px;width:76%;margin-bottom:7px"></div><div class="skeleton" style="height:11px;width:43%"></div></div>
        <div class="news-divider"></div>
        <div class="news-item"><div class="skeleton" style="height:16px;width:68%;margin-bottom:7px"></div><div class="skeleton" style="height:11px;width:48%"></div></div>
      </div>
      <div class="carousel-indicator" id="carousel-dots"></div>
    </div>
  </div>

</div>

<script>
// ═════════════════════════════════════════════════
// CONFIG
// ═════════════════════════════════════════════════
const CONFIG = {
  // Location is auto-detected via GPS. This is the fallback if denied.
  fallback: { name: "Denver, CO", lat: 39.7385, lon: -104.9849, tz: "America/Denver" },
  location: { name: "Detecting…", lat: 39.7385, lon: -104.9849 },
  weather: {

const WMO_ICON = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',56:'🌧️',57:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',66:'🌧️',67:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',77:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};
const WMO_TEXT = {0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',45:'Fog',48:'Rime Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',56:'Freezing Drizzle',57:'Hvy Freezing Drizzle',61:'Light Rain',63:'Rain',65:'Heavy Rain',66:'Freezing Rain',67:'Hvy Freezing Rain',71:'Light Snow',73:'Snow',75:'Heavy Snow',77:'Snow Grains',80:'Showers',81:'Showers',82:'Heavy Showers',85:'Snow Showers',86:'Heavy Snow',95:'Thunderstorm',96:'T-storm + Hail',99:'Severe T-storm'};

function getScene(code, isDay) {
  if (!isDay) return 'night';
  if (code === 45 || code === 48) return 'fog';
  if ((code>=71&&code<=77)||(code>=85&&code<=86)) return 'snowy';
  if (code>=95) return 'thunderstorm';
  if ((code>=51&&code<=67)||(code>=80&&code<=82)) return 'rainy';
  if (code===0) return 'sunny';
  if (code<=2) return 'partly-cloudy';
  return 'cloudy';
}

// ═════════════════════════════════════════════════
// APPLY WEATHER BACKGROUND
// ═════════════════════════════════════════════════
function applyBackground(scene) {
  const bg      = document.getElementById('weather-bg');
  const bgBlur  = document.getElementById('weather-bg-blur');
  const overlay = document.getElementById('weather-anim-overlay');
  const photoUrl = WEATHER_PHOTOS[scene] || WEATHER_PHOTOS.cloudy;

  // Sharp background (behind everything)
  bg.style.backgroundImage = `url('${photoUrl}')`;
  // Pre-blurred copy (sits just below the glass cards)
  bgBlur.style.backgroundImage = `url('${photoUrl}')`;

  // Apply scene class to the colour overlay
  const scenes = ['sunny','partly-cloudy','cloudy','rainy','thunderstorm','snowy','fog','night'];
  scenes.forEach(s => overlay.classList.remove('scene-' + s));
  overlay.classList.add('scene-' + scene);

  // Update location icon
  const iconMap = {sunny:'☀️','partly-cloudy':'⛅',cloudy:'☁️',rainy:'🌧️',snowy:'❄️',night:'🌙',fog:'🌫️',thunderstorm:'⛈️'};
  document.querySelector('.loc-icon').textContent = iconMap[scene] || '☁️';
}

// ═════════════════════════════════════════════════
// WEATHER EFFECTS
// ═════════════════════════════════════════════════
function renderEffects(scene) {
  const el = document.getElementById('weather-effects');
  el.innerHTML = '';
  if (scene === 'rainy' || scene === 'thunderstorm') {
    const count = scene === 'thunderstorm' ? 100 : 80;
    for (let i=0; i<count; i++) {
      const r = document.createElement('div'); r.className = 'raindrop';
      Object.assign(r.style, {
        left: Math.random()*100+'%', height: (14+Math.random()*24)+'px',
        animationDuration: (0.25+Math.random()*0.3)+'s',
        animationDelay: (-Math.random()*2)+'s',
        opacity: 0.2+Math.random()*0.4
      });
      el.appendChild(r);
    }
  }
  if (scene === 'snowy') {
    for (let i=0; i<40; i++) {
      const s = document.createElement('div'); s.className = 'snowflake';
      const sz = (3+Math.random()*5)+'px';
      Object.assign(s.style, {
        left: Math.random()*100+'%', width: sz, height: sz,
        animationDuration: (4+Math.random()*5)+'s',
        animationDelay: (-Math.random()*5)+'s',
        opacity: 0.2+Math.random()*0.45
      });
      el.appendChild(s);
    }
  }
  if (scene === 'night') {
    for (let i=0; i<30; i++) {
      const star = document.createElement('div');
      star.style.cssText = `position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;
        opacity:${0.1+Math.random()*0.5};top:${Math.random()*60}%;left:${Math.random()*100}%;
        animation:pulse-dot ${2+Math.random()*3}s ease infinite;animation-delay:${-Math.random()*3}s;`;
      el.appendChild(star);
    }
  }
}

// ═════════════════════════════════════════════════
// CLOCK — uses detected timezone so it's always local
// ═════════════════════════════════════════════════
function updateClock() {
  const tz = CONFIG.weather.params.timezone;
  const now = new Date();
  // Format time in the detected timezone
  const timeParts = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, hour: 'numeric', minute: '2-digit', hour12: true
  }).formatToParts(now);
  const h = timeParts.find(p => p.type === 'hour')?.value || '--';
  const m = timeParts.find(p => p.type === 'minute')?.value || '--';
  const ampm = timeParts.find(p => p.type === 'dayPeriod')?.value || '';
  document.getElementById('clock-time').innerHTML = `${h}:${m}<span id="clock-ampm">${ampm}</span>`;

  const dateFmt = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, weekday: 'long', month: 'short', day: 'numeric'
  }).format(now);
  document.getElementById('clock-date').textContent = dateFmt;
}
setInterval(updateClock, 1000); updateClock();

// Calendar — also timezone-aware
function updateCalendar() {
  const tz = CONFIG.weather.params.timezone;
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, month: 'long', day: 'numeric', weekday: 'long'
  }).formatToParts(now);
  const month   = parts.find(p => p.type === 'month')?.value || '';
  const day     = parts.find(p => p.type === 'day')?.value || '';
  const weekday = parts.find(p => p.type === 'weekday')?.value || '';
  document.getElementById('cal-month').textContent = month.toUpperCase();
  document.getElementById('cal-day').textContent = day;
  document.getElementById('cal-weekday').textContent = weekday;
}
setInterval(updateCalendar, 60000); updateCalendar();

// ═════════════════════════════════════════════════
// WEATHER
// ═════════════════════════════════════════════════
async function fetchWeather() {
  try {
    const p = CONFIG.weather.params;
    const url = `${CONFIG.weather.apiUrl}?latitude=${CONFIG.location.lat}&longitude=${CONFIG.location.lon}`
      + `&current=${p.current}&daily=${p.daily}&timezone=${encodeURIComponent(p.timezone)}`
      + `&temperature_unit=${p.temperature_unit}&wind_speed_unit=${p.wind_speed_unit}`
      + `&precipitation_unit=${p.precipitation_unit}&forecast_days=${p.forecast_days}`;
    const res = await fetch(url);
    const data = await res.json();

    const code = data.current.weather_code;
    const isDay = data.current.is_day === 1;
    const temp = Math.round(data.current.temperature_2m);
    const hi = Math.round(data.daily.temperature_2m_max[0]);
    const lo = Math.round(data.daily.temperature_2m_min[0]);

    document.getElementById('w-icon').textContent = WMO_ICON[code] || '🌡️';
    document.getElementById('w-temp').innerHTML = `${temp}<span class="w-temp-unit">°F</span>`;
    document.getElementById('w-cond').textContent = WMO_TEXT[code] || 'Unknown';
    document.getElementById('w-hilo').textContent = `H:${hi}° L:${lo}°`;

    const scene = getScene(code, isDay);
    applyBackground(scene);
    renderEffects(scene);
    // Forecast
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const strip = document.getElementById('forecast-strip');
    strip.innerHTML = '';
    for (let i = 0; i < data.daily.time.length; i++) {
      const d = new Date(data.daily.time[i]+'T12:00:00');
      const label = i===0 ? 'Today' : dayNames[d.getDay()];
      const dc = data.daily.weather_code[i];
      const dhi = Math.round(data.daily.temperature_2m_max[i]);
      const precip = data.daily.precipitation_probability_max[i];
      strip.innerHTML += `<div class="glass">
        <div class="fc-day">${label}</div><div class="fc-icon">${WMO_ICON[dc]||'🌡️'}</div>
        <div class="fc-temp">${dhi}°</div>
        <div class="fc-precip">${precip>10 ? '💧'+precip+'%' : ''}</div>
      </div>`;
    }
  } catch(e) {
    console.error('Weather error:', e);
    document.getElementById('w-cond').textContent = 'Offline';
    // Fallback background
    applyBackground('cloudy');
  }
}

// ═════════════════════════════════════════════════
// NEWS
// ═════════════════════════════════════════════════
let allNews = [], newsPage = 0;

// Fetch a single RSS feed, trying rss2json first, then CORS proxies
async function fetchOneFeed(feed) {
  const items = [];
  const TIMEOUT = 6000;

  // Helper: fetch with timeout
  function fetchT(url) {
    const c = new AbortController();
    const t = setTimeout(() => c.abort(), TIMEOUT);
    return fetch(url, { signal: c.signal }).finally(() => clearTimeout(t));
  }

  // ── Strategy 1: rss2json.com (returns JSON, no XML parsing needed) ──
  try {
    const r = await fetchT(CONFIG.rss2jsonUrl + encodeURIComponent(feed.url));
    if (r.ok) {
      const json = await r.json();
      if (json.status === 'ok' && json.items?.length) {
        json.items.forEach(it => {
          let domain = '';
          try { domain = new URL(it.link).hostname.replace('www.',''); } catch(_){}
          items.push({ title: it.title, link: it.link, pubDate: it.pubDate, source: feed.name, domain });
        });
        return items;
      }
    }
  } catch(_) { /* try next */ }

  // ── Strategy 2: try each CORS proxy in order ──
  for (const makeUrl of CONFIG.corsProxies) {
    try {
      const r = await fetchT(makeUrl(feed.url));
      if (!r.ok) continue;
      const text = await r.text();
      const xml = new DOMParser().parseFromString(text, 'application/xml');
      const xmlItems = xml.querySelectorAll('item');
      if (xmlItems.length === 0) continue;
      xmlItems.forEach(item => {
        const title   = item.querySelector('title')?.textContent || '';
        const link    = item.querySelector('link')?.textContent || '';
        const pubDate = item.querySelector('pubDate')?.textContent || '';
        let domain = '';
        try { domain = new URL(link).hostname.replace('www.',''); } catch(_){}
        items.push({ title, link, pubDate, source: feed.name, domain });
      });
      return items; // success — stop trying proxies
    } catch(_) { /* try next proxy */ }
  }

  console.warn(`All proxies failed for [${feed.name}]`);
  return items; // empty
}

async function fetchNews() {
  const rssFeeds = CONFIG.feeds.filter(f => f.type === 'RSS');
  // Fetch ALL feeds in parallel
  const results = await Promise.allSettled(rssFeeds.map(fetchOneFeed));
  allNews = results
    .filter(r => r.status === 'fulfilled')
    .flatMap(r => r.value);
  // Sort newest first
  allNews.sort((a, b) => {
    const da = a.pubDate ? new Date(a.pubDate) : 0;
    const db = b.pubDate ? new Date(b.pubDate) : 0;
    return db - da;
  });
  if (allNews.length === 0) {
    allNews = [{ title: "Unable to connect — check network or proxy", source: "System", pubDate: "", link: "", domain: "" }];
  }
  newsPage = 0;
  renderNewsPage();
  renderDots();
}

function renderNewsPage() {
  const container = document.getElementById('news-items');
  const start = newsPage * CONFIG.itemsPerPage;
  const page = allNews.slice(start, start + CONFIG.itemsPerPage);
  container.innerHTML = page.map((item, i) => {
    const ago = item.pubDate ? timeAgo(new Date(item.pubDate)) : '';
    const qrUrl = item.link
      ? `https://api.qrserver.com/v1/create-qr-code/?size=88x88&margin=0&data=${encodeURIComponent(item.link)}`
      : '';
    return `<div class="news-item" style="animation-delay:${i*0.04}s">
      <div class="news-item-body">
        <div class="news-item-title">${esc(item.title)}</div>
        <div class="news-item-meta">
          <span class="news-item-source">${item.source}</span>
          ${ago ? `<span>·</span><span>${ago}</span>` : ''}
          ${item.domain ? `<span>·</span><span class="news-item-url">${item.domain}</span>` : ''}
        </div>
      </div>
      ${qrUrl ? `<div class="news-qr"><img src="${qrUrl}" alt="QR" loading="lazy"></div>` : ''}
    </div>${i < page.length-1 ? '<div class="news-divider"></div>' : ''}`;
  }).join('');

  // Update source tag to show unique sources on this page
  const sources = [...new Set(page.map(i => i.source))];
  const tag = document.getElementById('news-source-tag');
  if (tag) tag.textContent = sources.join(' · ') || 'Feed';

  updateDots();
}

function renderDots() {
  const t = Math.ceil(allNews.length / CONFIG.itemsPerPage);
  const el = document.getElementById('carousel-dots');
  el.innerHTML = '';
  for (let i = 0; i < t; i++) {
    const d = document.createElement('div');
    d.className = 'carousel-dot' + (i===0 ? ' active' : '');
    d.addEventListener('click', () => { newsPage = i; renderNewsPage(); });
    el.appendChild(d);
  }
}
function updateDots() {
  document.querySelectorAll('.carousel-dot').forEach((d,i) => d.classList.toggle('active', i===newsPage));
}
function cycleNews() {
  const t = Math.ceil(allNews.length / CONFIG.itemsPerPage);
  if (t <= 1) return;
  newsPage = (newsPage+1) % t;
  renderNewsPage();
}
function timeAgo(d) {
  const s = (Date.now() - d.getTime()) / 1000;
  if (s < 0) return 'just now';
  if (s < 60)    return Math.floor(s) + 's ago';
  if (s < 3600)  return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  if (s < 2592000) return Math.floor(s / 86400) + 'd ago';   // < ~30 days
  if (s < 31536000) return Math.floor(s / 2592000) + 'mo ago'; // < 365 days
  return Math.floor(s / 31536000) + 'y ago';
}
function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

// ═════════════════════════════════════════════════
// SETTINGS PANEL — manage RSS feeds at runtime
// ═════════════════════════════════════════════════
function renderFeedList() {
  const el = document.getElementById('feed-list');
  el.innerHTML = CONFIG.feeds.map((f, i) => `
    <div class="feed-row">
      <span class="feed-name">${esc(f.name)}</span>
      <span class="feed-url" title="${esc(f.url)}">${esc(f.url)}</span>
      <button class="feed-del" onclick="removeFeed(${i})" title="Remove">&times;</button>
    </div>`).join('');
}
function addFeed() {
  const nameEl = document.getElementById('add-feed-name');
  const urlEl  = document.getElementById('add-feed-url');
  const name = nameEl.value.trim();
  const url  = urlEl.value.trim();
  if (!name || !url) return;
  CONFIG.feeds.push({ type: "RSS", url, name });
  nameEl.value = ''; urlEl.value = '';
  renderFeedList();
  fetchNews();
}
function removeFeed(i) {
  CONFIG.feeds.splice(i, 1);
  renderFeedList();
  fetchNews();
}

// ═════════════════════════════════════════════════
// AUTO-DETECT LOCATION — like iPhone auto-switching
// Uses GPS → reverse geocode for city name → updates everything
// ═════════════════════════════════════════════════
async function reverseGeocode(lat, lon) {
  // Open-Meteo has a free geocoding API (no key needed)
  try {
    const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
    const d = await r.json();
    const city = d.city || d.locality || d.principalSubdivision || '';
    const region = d.principalSubdivision || '';
    const country = d.countryCode || '';
    if (city && region && country === 'US') return `${city}, ${region}`;
    if (city && country) return `${city}, ${country}`;
    if (city) return city;
    return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
  } catch(_) {
    return `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
  }
}

function applyLocation(lat, lon, name) {
  CONFIG.location = { name, lat, lon };
  // Detect timezone from the browser (matches the physical location)
  CONFIG.weather.params.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  // Update UI labels
  document.getElementById('loc-text').textContent = name;
  document.querySelector('.widget-weather .widget-label').textContent = name.split(',')[0];
  document.title = `DigiSign — ${name}`;
  // Refresh everything with new location
  updateClock();
  updateCalendar();
  fetchWeather();
}

async function detectLocation() {
  // Try GPS first
  if ('geolocation' in navigator) {
    try {
      const pos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: false, timeout: 8000, maximumAge: 300000
        });
      });
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const name = await reverseGeocode(lat, lon);
      applyLocation(lat, lon, name);
      return;
    } catch(e) {
      console.warn('Geolocation denied/failed:', e.message);
    }
  }

  // Fallback: try IP-based geolocation (no permission needed)
  try {
    const r = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    if (d.latitude && d.longitude) {
      const name = d.city && d.region
        ? `${d.city}, ${d.country === 'US' ? d.region : d.country_name}`
        : CONFIG.fallback.name;
      CONFIG.weather.params.timezone = d.timezone || CONFIG.weather.params.timezone;
      applyLocation(d.latitude, d.longitude, name);
      return;
    }
  } catch(_) { console.warn('IP geolocation failed'); }

  // Final fallback: use hardcoded Denver
  console.log('Using fallback location: Denver, CO');
  const fb = CONFIG.fallback;
  CONFIG.weather.params.timezone = fb.tz;
  applyLocation(fb.lat, fb.lon, fb.name);
}

// ═════════════════════════════════════════════════
// INIT
// ═════════════════════════════════════════════════
renderFeedList();
fetchNews();
setInterval(fetchNews, 5*60*1000);
setInterval(cycleNews, CONFIG.cycle*1000);
// Detect location first, which triggers fetchWeather
detectLocation();
// Re-check weather every 15 min, re-check location every hour
setInterval(fetchWeather, 15*60*1000);
setInterval(detectLocation, 60*60*1000);
</script>
